<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 42px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 20px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #64748b; }
      .hub { fill: #eef2ff; stroke: #6d5bd0; stroke-width: 2.6; rx: 14; }
      .module { fill: #ffffff; stroke: #8b7fd3; stroke-width: 2.1; rx: 10; }
      .sub { fill: #ffffff; stroke: #c4b5fd; stroke-width: 1.7; rx: 8; }
      .tool { fill: #f0fdfa; stroke: #0f766e; stroke-width: 1.9; rx: 8; }
      .bench { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.9; rx: 8; }
      .text { font: 600 23px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #1f2937; }
      .text-small { font: 400 17px "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #475569; }
      .edge { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .edge-light { stroke: #71717a; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1120"/>
  <text class="title" x="800" y="70" text-anchor="middle">Mini Agent 模块架构关系图</text>
  <text class="subtitle" x="800" y="108" text-anchor="middle">以 Agent Harness 为中心，统一模型、工具、记忆、压缩、恢复与评测</text>

  <rect class="hub" x="610" y="440" width="380" height="130"/>
  <text class="text" x="800" y="493" text-anchor="middle">Agent Harness</text>
  <text class="text-small" x="800" y="526" text-anchor="middle">统一执行链路 / 状态编排 / 工件落盘</text>

  <rect class="module" x="55" y="260" width="270" height="82"/>
  <text class="text" x="190" y="294" text-anchor="middle">User</text>
  <text class="text-small" x="190" y="323" text-anchor="middle">任务输入与反馈</text>
  <path class="edge" d="M325 301 C440 320 515 385 610 472"/>

  <rect class="module" x="665" y="200" width="270" height="88"/>
  <text class="text" x="800" y="234" text-anchor="middle">Model Adapter</text>
  <text class="text-small" x="800" y="264" text-anchor="middle">支持不同模型后端</text>
  <path class="edge" d="M800 288 L800 440"/>

  <rect class="module" x="105" y="565" width="300" height="92"/>
  <text class="text" x="255" y="600" text-anchor="middle">Tool Runtime</text>
  <text class="text-small" x="255" y="630" text-anchor="middle">统一工具执行与安全边界</text>
  <path class="edge" d="M405 611 C500 585 540 548 610 520"/>

  <rect class="tool" x="45" y="700" width="190" height="50"/>
  <text class="text-small" x="140" y="731" text-anchor="middle">参数校验</text>
  <rect class="tool" x="265" y="700" width="190" height="50"/>
  <text class="text-small" x="360" y="731" text-anchor="middle">工作区隔离</text>
  <rect class="tool" x="45" y="770" width="190" height="50"/>
  <text class="text-small" x="140" y="801" text-anchor="middle">高风险审批</text>
  <rect class="tool" x="265" y="770" width="190" height="50"/>
  <text class="text-small" x="360" y="801" text-anchor="middle">结果落盘</text>
  <rect class="tool" x="155" y="840" width="190" height="50"/>
  <text class="text-small" x="250" y="871" text-anchor="middle">Secret Redaction</text>
  <path class="edge-light" d="M255 657 L250 700"/>

  <rect class="module" x="1135" y="170" width="330" height="92"/>
  <text class="text" x="1300" y="205" text-anchor="middle">Memory System</text>
  <text class="text-small" x="1300" y="235" text-anchor="middle">结构化记忆与按需召回</text>
  <path class="edge" d="M1135 216 C1045 275 985 348 920 440"/>

  <rect class="sub" x="1090" y="305" width="190" height="50"/>
  <text class="text-small" x="1185" y="336" text-anchor="middle">热索引 MEMORY.md</text>
  <rect class="sub" x="1320" y="305" width="190" height="50"/>
  <text class="text-small" x="1415" y="336" text-anchor="middle">冷专题 Topic Files</text>
  <rect class="sub" x="1090" y="375" width="190" height="50"/>
  <text class="text-small" x="1185" y="406" text-anchor="middle">相关记忆召回</text>
  <rect class="sub" x="1320" y="375" width="190" height="50"/>
  <text class="text-small" x="1415" y="406" text-anchor="middle">过期记忆验证提示</text>
  <path class="edge-light" d="M1300 262 L1300 305"/>

  <rect class="module" x="1140" y="540" width="340" height="92"/>
  <text class="text" x="1310" y="575" text-anchor="middle">Context Governance</text>
  <text class="text-small" x="1310" y="605" text-anchor="middle">五层长上下文治理流水线</text>
  <path class="edge" d="M1140 586 C1072 558 1028 535 990 514"/>

  <rect class="sub" x="1065" y="680" width="220" height="50"/>
  <text class="text-small" x="1175" y="711" text-anchor="middle">Tool Result Budget</text>
  <rect class="sub" x="1325" y="680" width="150" height="50"/>
  <text class="text-small" x="1400" y="711" text-anchor="middle">Snip</text>
  <rect class="sub" x="1065" y="750" width="220" height="50"/>
  <text class="text-small" x="1175" y="781" text-anchor="middle">Micro-Compact</text>
  <rect class="sub" x="1325" y="750" width="220" height="50"/>
  <text class="text-small" x="1435" y="781" text-anchor="middle">Context Collapse</text>
  <rect class="sub" x="1195" y="820" width="240" height="50"/>
  <text class="text-small" x="1315" y="851" text-anchor="middle">Full Auto-Compact</text>
  <path class="edge-light" d="M1310 632 L1310 680"/>

  <rect class="module" x="635" y="750" width="330" height="92"/>
  <text class="text" x="800" y="785" text-anchor="middle">Checkpoint</text>
  <text class="text-small" x="800" y="815" text-anchor="middle">中断恢复与 workspace 漂移识别</text>
  <path class="edge" d="M800 750 L800 570"/>

  <rect class="sub" x="570" y="885" width="190" height="50"/>
  <text class="text-small" x="665" y="916" text-anchor="middle">保存任务状态</text>
  <rect class="sub" x="790" y="885" width="190" height="50"/>
  <text class="text-small" x="885" y="916" text-anchor="middle">恢复消息历史</text>
  <rect class="sub" x="680" y="955" width="230" height="50"/>
  <text class="text-small" x="795" y="986" text-anchor="middle">识别 workspace 漂移</text>
  <path class="edge-light" d="M800 842 L800 885"/>

  <rect class="module" x="520" y="135" width="235" height="76"/>
  <text class="text" x="638" y="167" text-anchor="middle">Session State</text>
  <text class="text-small" x="638" y="194" text-anchor="middle">会话历史管理</text>
  <path class="edge" d="M638 211 C610 295 630 370 700 440"/>

  <rect class="module" x="230" y="130" width="270" height="86"/>
  <text class="text" x="365" y="164" text-anchor="middle">Benchmark</text>
  <text class="text-small" x="365" y="193" text-anchor="middle">模块收益与回归评测</text>
  <path class="edge" d="M500 173 C570 235 620 330 690 440"/>

  <rect class="bench" x="105" y="55" width="210" height="48"/>
  <text class="text-small" x="210" y="85" text-anchor="middle">Harness Regression</text>
  <rect class="bench" x="340" y="55" width="210" height="48"/>
  <text class="text-small" x="445" y="85" text-anchor="middle">Compression</text>
  <rect class="bench" x="105" y="230" width="210" height="48"/>
  <text class="text-small" x="210" y="260" text-anchor="middle">Memory</text>
  <rect class="bench" x="340" y="230" width="210" height="48"/>
  <text class="text-small" x="445" y="260" text-anchor="middle">Checkpoint</text>
</svg>
